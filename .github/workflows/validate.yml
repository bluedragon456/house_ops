name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository structure
        run: |
          test -f custom_components/house_ops/manifest.json
          test -f custom_components/house_ops/__init__.py
          test -f custom_components/house_ops/config_flow.py
          test -f custom_components/house_ops/services.yaml
          test -f hacs.json
          test -f www/house_ops/house-ops-strategy.js

      - name: Validate manifest contents
        run: |
          python - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          manifest = Path("custom_components/house_ops/manifest.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          const = Path("custom_components/house_ops/const.py")
          const_text = const.read_text(encoding="utf-8")

          if data.get("domain") != "house_ops":
              print("Domain must be house_ops")
              sys.exit(1)

          if data.get("config_flow") is not True:
              print("config_flow must be true")
              sys.exit(1)

          if "version" not in data:
              print("version missing from manifest")
              sys.exit(1)

          match = re.search(r'^VERSION = "([^"]+)"$', const_text, re.MULTILINE)
          if not match:
              print("VERSION missing from const.py")
              sys.exit(1)

          if match.group(1) != data["version"]:
              print(f"const.py VERSION {match.group(1)} does not match manifest version {data['version']}")
              sys.exit(1)

          print("Manifest validation passed")
          PY

      - name: Compile integration
        run: python -m compileall custom_components/house_ops
