mark_serviced:
  fields:
    asset_id:
      name: Asset ID
      description: The internal HouseOps equipment identifier.
      required: true
      selector:
        text:
    task_key:
      name: Task key
      description: The maintenance task to complete.
      required: true
      selector:
        text:
    occurred_on:
      name: Completed on
      description: Optional completion date. Leave empty to use today.
      selector:
        date:

snooze_task:
  fields:
    asset_id:
      name: Asset ID
      required: true
      selector:
        text:
    task_key:
      name: Task key
      required: true
      selector:
        text:
    days:
      name: Snooze days
      description: How many days to snooze the task.
      selector:
        number:
          min: 1
          max: 90
          mode: box

recalculate:
  description: Recalculate all HouseOps maintenance schedules immediately.

add_asset:
  fields:
    equipment_type:
      name: Equipment type
      required: true
      selector:
        text:
    name:
      name: Equipment name
      selector:
        text:
    source_entity:
      name: Linked Home Assistant device
      description: Optional device used to pull device name, area, manufacturer, model, and battery sensor details.
      selector:
        device:
    area_id:
      name: Home Assistant area ID
      selector:
        text:
    custom_area:
      name: Custom area name
      selector:
        text:
    power_type:
      name: Power type
      selector:
        text:
    battery_service_mode:
      name: Fire alarm battery type
      description: Use replaceable for batteries you swap, or sealed for batteries that last the detector's lifespan.
      selector:
        text:
    robot_mop_style:
      name: Robot mop style
      description: Use single pad / roller for roller mops and other single-pad systems.
      selector:
        text:
    robot_dock_type:
      name: Robot dock type
      selector:
        text:
    manufacturer:
      name: Manufacturer
      selector:
        text:
    model:
      name: Model
      selector:
        text:
    install_date:
      name: Install date
      selector:
        date:
    last_serviced_date:
      name: Last serviced date
      selector:
        date:
    next_due_override:
      name: Next due override
      selector:
        date:
    base_interval_days:
      name: Primary task repeat interval
      required: true
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    inspection_interval_days:
      name: Inspection interval
      selector:
        number:
          min: 30
          max: 3650
          mode: box
    anode_interval_days:
