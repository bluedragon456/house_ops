    notes:
      name: Notes
      selector:
        text:
    runtime_sensor:
      name: Runtime sensor
      selector:
        entity:
          domain:
            - sensor
            - number
            - input_number
    runtime_threshold:
      name: Runtime threshold
      selector:
        number:
          min: 0
          max: 100000
          mode: box
    usage_sensor:
      name: Usage sensor
      selector:
        entity:
          domain:
            - sensor
            - number
            - input_number
    usage_threshold:
      name: Usage threshold
      selector:
        number:
          min: 0
          max: 100000
          mode: box
    battery_sensor:
      name: Battery sensor
