      selector:
        number:
          min: 1
          max: 3650
          mode: box
    contact_cleaning_interval_days:
      name: Charging contact interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    mop_service_interval_days:
      name: Mop pad / roller interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    water_tank_interval_days:
      name: Water tank interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    dock_dust_bag_interval_days:
      name: Dock dust bag interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    dock_air_path_interval_days:
      name: Dock dust path interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    dock_clean_water_tank_interval_days:
      name: Dock clean water tank interval
