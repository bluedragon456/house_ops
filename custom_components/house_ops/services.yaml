        number:
          min: 365
          max: 7300
          mode: box
    dust_bin_interval_days:
      name: Dust bin interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    main_brush_interval_days:
      name: Main brush interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    side_brush_interval_days:
      name: Side brush interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    wheel_clean_interval_days:
      name: Wheel and hair cleanup interval
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    sensor_cleaning_interval_days:
