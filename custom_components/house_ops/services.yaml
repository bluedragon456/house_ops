mark_serviced:
  fields:
    asset_id:
      name: Asset ID
      description: The internal HouseOps equipment identifier.
      required: true
      selector:
        text:
    task_key:
      name: Task key
      description: The maintenance task to complete.
      required: true
      selector:
        text:
    occurred_on:
      name: Completed on
      description: Optional completion date. Leave empty to use today.
      selector:
        date:

snooze_task:
  fields:
    asset_id:
      name: Asset ID
      required: true
      selector:
        text:
    task_key:
      name: Task key
      required: true
      selector:
        text:
    days:
      name: Snooze days
      description: How many days to snooze the task.
      selector:
        number:
          min: 1
          max: 90
          mode: box

recalculate:
  description: Recalculate all HouseOps maintenance schedules immediately.

add_asset:
  fields:
    equipment_type:
      name: Equipment type
      required: true
      selector:
        text:
    name:
      name: Equipment name
      required: true
      selector:
        text:
    area_id:
      name: Home Assistant area ID
      selector:
        text:
    custom_area:
      name: Custom area name
      selector:
        text:
    power_type:
      name: Power type
      selector:
        text:
    manufacturer:
      name: Manufacturer
      selector:
        text:
    model:
      name: Model
      selector:
        text:
    install_date:
      name: Install date
      selector:
        date:
    last_serviced_date:
      name: Last serviced date
      selector:
        date:
    next_due_override:
      name: Next due override
      selector:
        date:
    base_interval_days:
      name: Primary task interval
      required: true
      selector:
        number:
          min: 1
          max: 3650
          mode: box
    inspection_interval_days:
      name: Inspection interval
      selector:
        number:
          min: 30
          max: 3650
          mode: box
    anode_interval_days:
      name: Anode interval
      selector:
        number:
          min: 180
          max: 3650
          mode: box
    battery_interval_days:
      name: Battery interval
      selector:
        number:
          min: 30
          max: 730
          mode: box
    replacement_interval_days:
      name: Replacement advisory interval
      selector:
        number:
          min: 365
          max: 7300
          mode: box
    notes:
      name: Notes
      selector:
        text:
    runtime_sensor:
      name: Runtime sensor
      selector:
        entity:
          domain:
            - sensor
            - number
            - input_number
    runtime_threshold:
      name: Runtime threshold
      selector:
        number:
          min: 0
          max: 100000
          mode: box
    usage_sensor:
      name: Usage sensor
      selector:
        entity:
          domain:
            - sensor
            - number
            - input_number
    usage_threshold:
      name: Usage threshold
      selector:
        number:
          min: 0
          max: 100000
          mode: box
    battery_sensor:
      name: Battery sensor
      selector:
        entity:
          domain:
            - sensor
            - number
    battery_threshold:
      name: Battery threshold
      selector:
        number:
          min: 1
          max: 100
          mode: box
    enable_anode_task:
      name: Track anode rod inspection
      selector:
        boolean:
