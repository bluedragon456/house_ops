<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">HouseOps asset detail dashboard example</title>
  <desc id="desc">Illustrated example of a per-asset HouseOps dashboard page.</desc>
  <rect width="1280" height="760" fill="#edf2f8" />
  <rect x="42" y="30" width="1196" height="700" rx="28" fill="#ffffff" stroke="#d7e0ea" />
  <text x="88" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#173552">Main HVAC</text>
  <text x="88" y="119" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#647b8e">Asset detail page generated by the HouseOps dashboard strategy</text>

  <rect x="88" y="154" width="500" height="188" rx="22" fill="#f8fbff" stroke="#d9e4ee" />
  <text x="116" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#19324d">Status</text>
  <rect x="118" y="216" width="118" height="36" rx="12" fill="#ffe7e7" />
  <text x="147" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#a23838">OVERDUE</text>
  <text x="118" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4e667d">Next service: 2026-03-18</text>
  <text x="118" y="316" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4e667d">Days remaining: -3</text>

  <rect x="622" y="154" width="528" height="188" rx="22" fill="#f8fbff" stroke="#d9e4ee" />
  <text x="650" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#19324d">Actions</text>
  <rect x="650" y="224" width="208" height="84" rx="18" fill="#183b56" />
  <text x="701" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Mark Serviced</text>
  <rect x="892" y="224" width="208" height="84" rx="18" fill="#2f5877" />
  <text x="959" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Snooze</text>

  <rect x="88" y="382" width="1062" height="284" rx="22" fill="#f8fbff" stroke="#d9e4ee" />
  <text x="116" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#19324d">Details</text>

  <rect x="116" y="452" width="1006" height="58" rx="14" fill="#ffffff" stroke="#d7e0ea" />
  <text x="142" y="487" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#29465f">Maintenance status</text>
  <text x="962" y="487" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#a23838">overdue</text>

  <rect x="116" y="524" width="1006" height="58" rx="14" fill="#ffffff" stroke="#d7e0ea" />
  <text x="142" y="559" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#29465f">Next service date</text>
  <text x="918" y="559" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#29465f">2026-03-18</text>

  <rect x="116" y="596" width="1006" height="58" rx="14" fill="#ffffff" stroke="#d7e0ea" />
  <text x="142" y="631" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#29465f">Maintenance reason</text>
  <text x="466" y="631" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#29465f">Overdue by 3 day(s). Base interval is 90 days. Runtime sensor crossed threshold.</text>
</svg>
