  <text x="1002" y="612" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Snooze Water Heater</text>
  <text x="1009" y="641" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#d2e1ed">Pushes out the next reminder</text>
